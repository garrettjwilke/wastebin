<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="generator" content="wastebin {{ meta.version }}">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{ meta.title }}{% block title_content %}{% endblock %}</title>
    <link rel="preload" as="style" href="dark.css">
    <link rel="preload" as="style" href="light.css">
    <link rel="stylesheet" href="{{ base_path.join(meta.highlight.style.name) }}">
    <link rel="icon" href="{{ base_path.join("favicon.ico") }}" type="image/png">
    {% block head %}{% endblock %}
  </head>
  <body>
    {% block body_top %}{% endblock %}
    <div id="main-container">
      <header>
        <div class="nav-group">
          {% block title %}{% endblock %}
        </div>
        <div class="nav-group" id="nav-group-actions">
          {% block nav_common %}{% endblock %}
          {% block nav_specific %}{% endblock %}
        </div>
      </header>
      <main>
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
